services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: documind-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=DocuMind@2025!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build: .
    container_name: documind-api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=DocuMind;User Id=sa;Password=DocuMind@2025!;TrustServerCertificate=true;
      - Gemini__ApiKey=${GEMINI_API_KEY}
    depends_on:
      - sqlserver

volumes:
  sqlserver-data: